#
# Shipped — one-command self-host stack (ARCHITECTURE.md §13 row 13, §14.4).
#
# `docker compose -f deploy/docker-compose.yml up --build` builds and starts the
# WHOLE local stack:
#   * api        — the Go control-plane API (built from services/api/Dockerfile)
#   * dashboard  — the Next.js dashboard      (built from apps/dashboard/Dockerfile)
#   * postgres   — bundled Postgres 16        [profile: local-db]      (OPTIONAL)
#   * minio      — bundled R2/S3-compatible    [profile: local-storage] (OPTIONAL)
#   * mailpit    — bundled SMTP + web inbox     [profile: local-mail]    (OPTIONAL)
#   * migrate    — one-shot goose runner for the `app` schema + shipped_app role
#
# OSS / self-host: SHIPPED_CLOUD=false ⇒ the no-op/unlimited QuotaProvider ⇒ no
# Stripe, no caps, no cloud/ee. The api image defaults to the OSS build.
#
# OPTIONAL bundled data services (the open-core promise: bring your own backends):
#   * The hosted Shipped SaaS runs on Supabase (managed Postgres) + Cloudflare R2.
#   * Self-host DEFAULTS to the bundled postgres + minio (the `local-db` /
#     `local-storage` profiles, enabled via COMPOSE_PROFILES in deploy/.env).
#   * To use Supabase / an external Postgres instead: drop `local-db` from
#     COMPOSE_PROFILES and point DATABASE_URL + DATABASE_OWNER_URL at it.
#   * To use Cloudflare R2 / external S3 instead: drop `local-storage` and set the
#     S3_* vars. `api`/`dashboard` depend on the bundled services with
#     `required: false`, so they run with or without them.
#
# Quickstart:  cp deploy/.env.example deploy/.env && docker compose -f deploy/docker-compose.yml up --build
# See deploy/README.md for the full walkthrough (incl. the one-time Better Auth migration).

name: shipped

services:
  # ===========================================================================
  # APPLICATION — built from this repo.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # api — the Go control-plane (system of record + authz boundary). OSS build
  # (unlimited). Connects to Postgres as the non-BYPASSRLS shipped_app role and to
  # the object store for blobs/manifests. Waits for migrations to finish.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
      # For the hosted-cloud (Stripe) build: args: { SHIPPED_BUILD_TAGS: cloud }
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # In-memory edge projection in the container (no shared file with a Worker
      # here); avoids a writable-volume requirement on the distroless image.
      PROJECTION_FILE: ""
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
        required: false
      createbucket:
        condition: service_completed_successfully
        required: false

  # ---------------------------------------------------------------------------
  # dashboard — the Next.js app (Better Auth + the /authz exchange). Talks to the
  # Go API for business data and to Postgres for Better Auth's identity tables.
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # SERVER-side (RSC / server actions) calls the Go API over the Docker network:
      # inside this container `localhost` is the container, not the api, so use the
      # service name. The BROWSER keeps NEXT_PUBLIC_API_URL (localhost:8080 → the
      # host-published api). Override DASHBOARD_API_URL for an external api.
      API_URL: ${DASHBOARD_API_URL:-http://api:8080}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
        required: false

  # ===========================================================================
  # MIGRATIONS — always runs (against the bundled OR an external Postgres).
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # migrate — one-shot goose runner. Applies the Go-owned `app` schema migrations
  # as the privileged OWNER role (DATABASE_OWNER_URL), then sets the runtime
  # `shipped_app` role's password (the role is created NOSUPERUSER / NOBYPASSRLS by
  # migration 0001), then exits. It does NOT apply the cloud-only
  # db/migrations/billing — that schema only exists in the hosted deployment.
  #
  # NOTE — Better Auth schema: the `auth` schema is owned + migrated by Better Auth
  # (the dashboard), NOT by goose. The dashboard connects via BETTER_AUTH_DATABASE_URL
  # (a privileged role that owns `auth`) with search_path=auth (lib/auth.ts). Run it
  # ONCE after first boot (`@better-auth/cli` is a separate package → pnpm dlx):
  #   docker compose -f deploy/docker-compose.yml exec dashboard \
  #     pnpm dlx @better-auth/cli@1.3.4 migrate --yes
  # (See deploy/README.md.) The app migrations create an EMPTY `auth` schema as a
  # namespace + grant shipped_app SELECT on the auth tables (0012); app rows attach
  # via app.org_meta (PK = Better Auth organization.id).
  #
  # `required: false` on postgres so this also works against an external/Supabase
  # DATABASE_OWNER_URL with the bundled postgres profile disabled.
  # ---------------------------------------------------------------------------
  migrate:
    image: golang:1.25
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: ${DATABASE_OWNER_URL:-postgres://postgres:postgres@postgres:5432/shipped?sslmode=disable}
      SHIPPED_APP_DB_PASSWORD: ${SHIPPED_APP_DB_PASSWORD:-shipped-app-dev-secret}
    working_dir: /repo
    volumes:
      - ../db:/repo/db:ro
    entrypoint: >
      /bin/sh -c "
      set -e &&
      go install github.com/pressly/goose/v3/cmd/goose@v3.27.1 &&
      /go/bin/goose -dir /repo/db/migrations/app up &&
      apt-get update >/dev/null && apt-get install -y --no-install-recommends postgresql-client >/dev/null &&
      psql \"$$GOOSE_DBSTRING\" -v ON_ERROR_STOP=1 -c \"ALTER ROLE shipped_app WITH PASSWORD '$$SHIPPED_APP_DB_PASSWORD';\" &&
      echo 'app migrations applied + shipped_app password set'
      "
    restart: "no"

  # ===========================================================================
  # OPTIONAL bundled data services (profiles). Default-on via COMPOSE_PROFILES in
  # deploy/.env. Disable to use Supabase (Postgres) / Cloudflare R2 (object store).
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # postgres — bundled system of record. [profile: local-db]
  # Hosted Shipped uses Supabase instead; disable this profile + set DATABASE_URL.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-shipped}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-shipped}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---------------------------------------------------------------------------
  # minio — bundled R2/S3-compatible object store. [profile: local-storage]
  # Holds per-org blobs/<org>/<sha256> + immutable deploy manifests. Console :9001.
  # Hosted Shipped uses Cloudflare R2 instead; disable + set the S3_* vars.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    profiles: ["local-storage"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-shipped}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-shipped-dev-secret}
      # CORS for browser folder drag-and-drop deploy: the dashboard hashes files
      # and PUTs blobs DIRECTLY to presigned URLs on this store, a cross-origin
      # request from the dashboard origin. Allow it (the presigned URL is itself the
      # credential). Default '*' for self-host simplicity; restrict to your dashboard
      # origin(s) in production (and set the matching R2 bucket CORS policy there).
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ALLOW_ORIGIN:-*}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"   # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---------------------------------------------------------------------------
  # createbucket — one-shot: ensure the blob bucket exists in MinIO.
  # ---------------------------------------------------------------------------
  createbucket:
    image: minio/mc:latest
    profiles: ["local-storage"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-shipped} ${MINIO_ROOT_PASSWORD:-shipped-dev-secret} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-shipped-blobs} &&
      echo 'bucket ${MINIO_BUCKET:-shipped-blobs} ready'
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # mailpit — bundled SMTP server + web inbox for LOCAL email. [profile: local-mail]
  # Catches every message the dashboard sends (verification / reset / magic link)
  # so you can click the link without a real provider. The dashboard sends here when
  # MAIL_SMTP_URL=smtp://mailpit:1025 (set in deploy/.env). Open the inbox at
  # http://localhost:8025. NOT for production — point MAIL_SMTP_URL at a real SMTP
  # provider (SES, Mailgun, Postmark, Resend's SMTP, …) and disable this profile.
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    profiles: ["local-mail"]
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"   # web inbox
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP (dashboard → mailpit)
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
  miniodata:
