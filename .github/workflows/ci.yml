# SPDX-License-Identifier: FSL-1.1-Apache-2.0
#
# Shipped CI — runs on every push to main AND every pull-request commit
# (`pull_request` fires on synchronize, i.e. each new commit pushed to the PR).
#
# The three test suites:
#   go-api          : the Go API + core — build · vet · `go test ./...` · cloud build.
#   dashboard-unit  : the dashboard's vitest unit tests (incl. the deploy digest parity).
#   e2e             : a real browser drives the full stack (Playwright).
#
# Plus the standing invariants:
#   open-core-boundary : the OSS core has ZERO references into cloud/ or ee/ (§11/§14).
#   sql                : goose app migrations apply on real Postgres + RLS isolation holds.
#   typecheck          : the whole TS workspace type-checks (contracts + apps + edge).
#
# See docs/ARCHITECTURE.md §12/§13 — these jobs map to verification rows 2, 10, 11.

name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # (a) Go API + core: build/vet/test the whole Go module — `go test ./...` covers
  #     the API handler/store/auth tests (services/api/...) plus the CLI + internal
  #     packages — then prove the cloud-tagged build also compiles. The cloud build
  #     pulls in cloud/quota + cloud/billing via the `cloud` build tag + DI.
  # ---------------------------------------------------------------------------
  go-api:
    name: go-api (build · vet · test · cloud build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: go build / vet / test (API + OSS core)
        run: |
          go build ./...
          go vet ./...
          go test ./...

      - name: go build (cloud build tag)
        # The cloud-only modules compile under `-tags cloud`. Self-host never sets it.
        run: go build -tags cloud ./...

  # ---------------------------------------------------------------------------
  # (b) Open-core boundary: the OSS build of the core (services/ cli/ internal/
  #     apps/ edge/) must NOT depend on anything under cloud/ or ee/. If it does,
  #     the self-host build would link proprietary code — fail (§11/§14.3).
  #
  #     Two complementary checks:
  #       1. Go (authoritative): `go list -deps` with NO build tags resolves the
  #          ACTUAL default/OSS dependency graph. Build-tagged DI files such as
  #          `//go:build cloud` wire_cloud.go are correctly EXCLUDED by the
  #          toolchain, so this is precise — no false positives on the legitimate
  #          cloud-only seam. We assert that graph contains no cloud/ or ee/ pkg.
  #       2. Non-Go (grep): apps/ + edge/ TS/JS must not *statically* import a
  #          cloud/ or ee/ path. The cloud wiring there is a runtime dynamic
  #          import gated on process.env.SHIPPED_CLOUD, never a top-level import.
  #          The grep skips files marked with a build-tag style opt-out comment.
  # ---------------------------------------------------------------------------
  open-core-boundary:
    name: open-core boundary (no core → cloud/ee refs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Go OSS dependency graph has zero cloud/ee packages
        shell: bash
        run: |
          set -euo pipefail

          # Build the list of core Go package patterns that actually exist.
          PATTERNS=()
          for d in services cli internal apps edge; do
            [ -d "$d" ] && PATTERNS+=("./$d/...")
          done

          if [ "${#PATTERNS[@]}" -eq 0 ]; then
            echo "No core Go directories present yet; skipping Go graph check."
            exit 0
          fi

          echo "Resolving OSS dependency graph (no build tags) for: ${PATTERNS[*]}"

          # NO -tags here: this is exactly what the self-host binary compiles.
          # Any cloud/ or ee/ package in the transitive deps is a real violation.
          if VIOL=$(go list -deps "${PATTERNS[@]}" 2>/dev/null \
              | grep -E 'github\.com/danielpang/shipped/(cloud|ee)(/|$)' || true); then
            if [ -n "$VIOL" ]; then
              echo "::error::OSS Go build depends on proprietary cloud/ or ee/ packages:"
              echo "$VIOL"
              echo
              echo "Inject these via the QuotaProvider/BillingProvider interfaces behind"
              echo "a //go:build cloud (or ee) tag, never as a default import."
              echo "See ARCHITECTURE.md §11/§14.3."
              exit 1
            fi
          fi
          echo "OK: OSS Go dependency graph contains no cloud/ or ee/ packages."

      - name: Non-Go core (apps/ edge/) has no static cloud/ee imports
        shell: bash
        run: |
          set -euo pipefail

          DIRS=()
          for d in apps edge; do
            [ -d "$d" ] && DIRS+=("$d")
          done

          if [ "${#DIRS[@]}" -eq 0 ]; then
            echo "No TS/JS core directories present yet; skipping grep check."
            exit 0
          fi

          echo "Scanning ${DIRS[*]} for static cloud/ee imports"

          # Match a static import/require/from of a cloud or ee path: the
          # @shipped/cloud|ee workspace alias, or a relative path ending in
          # /cloud/ or /ee/. A leading slash/quote + trailing slash boundary
          # prevents false hits on "cloudflare", "fee", "tree", etc.
          PATTERN='(from|import|require)[^;]*["'"'"'](@shipped/(cloud|ee)|[^"'"'"']*/(cloud|ee)/)'

          if MATCHES=$(grep -RInE \
                --include='*.ts' --include='*.tsx' \
                --include='*.js' --include='*.mjs' --include='*.cjs' \
                --exclude-dir=node_modules \
                --exclude-dir=dist \
                --exclude-dir=.next \
                "$PATTERN" "${DIRS[@]}" \
              || true); then
            if [ -n "$MATCHES" ]; then
              echo "::error::Core TS/JS statically imports cloud/ or ee/ code:"
              echo "$MATCHES"
              echo
              echo "Cloud features must be loaded via a runtime dynamic import gated on"
              echo "process.env.SHIPPED_CLOUD, never a top-level import. See §14.3."
              exit 1
            fi
          fi
          echo "OK: no static cloud/ee imports in core TS/JS."

  # ---------------------------------------------------------------------------
  # (c) SQL: apply the app migrations against a real Postgres 16, then assert RLS
  #     tenant isolation — set app.current_org_id to org A and confirm org B rows
  #     are invisible to the non-BYPASSRLS shipped_app role (§13 row 2).
  # ---------------------------------------------------------------------------
  sql:
    name: sql (goose migrate + RLS isolation)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shipped
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d shipped"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      # Owner connection: applies migrations + creates the shipped_app role.
      OWNER_DSN: postgres://postgres:postgres@localhost:5432/shipped?sslmode=disable
      # Runtime password we assign to shipped_app for the isolation assertion.
      APP_PW: shipped_app_ci_pw

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: install goose
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: apply app migrations
        run: goose -dir db/migrations/app postgres "$OWNER_DSN" up

      - name: set shipped_app runtime password
        run: psql "$OWNER_DSN" -v ON_ERROR_STOP=1 -c "ALTER ROLE shipped_app WITH PASSWORD '$APP_PW';"

      - name: seed two orgs (as owner, with tenant context)
        run: |
          psql "$OWNER_DSN" -v ON_ERROR_STOP=1 <<'SQL'
          -- Org A allows external sharing so a public-default site is permitted.
          SET app.current_org_id = '11111111-1111-1111-1111-111111111111';
          INSERT INTO app.org_meta (id, allow_external_sharing)
            VALUES ('11111111-1111-1111-1111-111111111111', true);
          INSERT INTO app.org_usage (org_id)
            VALUES ('11111111-1111-1111-1111-111111111111');
          INSERT INTO app.sites (org_id, slug, owner_user_id, access_mode)
            VALUES ('11111111-1111-1111-1111-111111111111', 'site-a',
                    'a0000000-0000-0000-0000-000000000001', 'public');

          -- Org B keeps external sharing off; its site uses org_only (allowed).
          SET app.current_org_id = '22222222-2222-2222-2222-222222222222';
          INSERT INTO app.org_meta (id, allow_external_sharing)
            VALUES ('22222222-2222-2222-2222-222222222222', false);
          INSERT INTO app.org_usage (org_id)
            VALUES ('22222222-2222-2222-2222-222222222222');
          INSERT INTO app.sites (org_id, slug, owner_user_id, access_mode)
            VALUES ('22222222-2222-2222-2222-222222222222', 'site-b',
                    'b0000000-0000-0000-0000-000000000001', 'org_only');
          SQL

      - name: RLS isolation assertion (as shipped_app, NON-BYPASSRLS)
        env:
          PGPASSWORD: ${{ env.APP_PW }}
        run: |
          # Connect as the runtime role; org A context must NOT see org B rows.
          psql "postgres://shipped_app@localhost:5432/shipped?sslmode=disable" \
            -v ON_ERROR_STOP=1 <<'SQL'
          -- Confirm we really are the non-BYPASSRLS runtime role.
          DO $$
          DECLARE bypass boolean;
          BEGIN
            SELECT rolbypassrls INTO bypass FROM pg_roles WHERE rolname = current_user;
            IF current_user <> 'shipped_app' OR bypass THEN
              RAISE EXCEPTION 'FAIL: expected non-BYPASSRLS shipped_app, got % (bypassrls=%)', current_user, bypass;
            END IF;
          END $$;

          SET app.current_org_id = '11111111-1111-1111-1111-111111111111';

          -- Org A sees exactly its own site.
          DO $$
          DECLARE n int;
          BEGIN
            SELECT count(*) INTO n FROM app.sites;
            IF n <> 1 THEN RAISE EXCEPTION 'FAIL: org A should see 1 site, saw %', n; END IF;
          END $$;

          -- Org B rows are invisible under org A context.
          DO $$
          DECLARE n int;
          BEGIN
            SELECT count(*) INTO n FROM app.sites
              WHERE org_id = '22222222-2222-2222-2222-222222222222';
            IF n <> 0 THEN RAISE EXCEPTION 'FAIL: org B rows visible to org A (%)', n; END IF;
          END $$;

          -- WITH CHECK blocks inserting a row for another org (org_only avoids the
          -- external-sharing trigger so this isolates the RLS check).
          DO $$
          BEGIN
            BEGIN
              INSERT INTO app.sites (org_id, slug, owner_user_id, access_mode)
                VALUES ('22222222-2222-2222-2222-222222222222', 'sneaky',
                        'c0000000-0000-0000-0000-000000000001', 'org_only');
              RAISE EXCEPTION 'FAIL: cross-tenant insert wrongly allowed';
            EXCEPTION WHEN insufficient_privilege THEN
              NULL; -- expected: RLS WITH CHECK rejected it
            END;
          END $$;

          -- Default-deny: with no tenant context, nothing is visible.
          RESET app.current_org_id;
          DO $$
          DECLARE n int;
          BEGIN
            SELECT count(*) INTO n FROM app.sites;
            IF n <> 0 THEN RAISE EXCEPTION 'FAIL: rows visible with no tenant context (%)', n; END IF;
          END $$;

          \echo 'PASS: RLS tenant isolation holds for shipped_app'
          SQL

  # ---------------------------------------------------------------------------
  # (d) Typecheck: the whole TS workspace compiles. `pnpm -r typecheck` runs the
  #     typecheck script in every workspace package that defines one (contracts,
  #     the dashboard, the edge worker).
  # ---------------------------------------------------------------------------
  typecheck:
    name: typecheck (TS workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: install workspace deps
        run: pnpm install --frozen-lockfile

      - name: typecheck all packages
        run: pnpm -r typecheck

  # ---------------------------------------------------------------------------
  # (e) Dashboard unit tests: the dashboard's vitest suite — pure lib logic,
  #     including the deploy manifest digest's byte-exact parity with Go's
  #     internal/manifest.Digest (a drift there silently breaks finalize).
  # ---------------------------------------------------------------------------
  dashboard-unit:
    name: dashboard (unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: install workspace deps
        run: pnpm install --frozen-lockfile

      - name: vitest
        run: pnpm --filter @shipped/dashboard test

  # ---------------------------------------------------------------------------
  # (f) E2E: the full self-host stack in Docker + a real browser. Boots compose
  #     (dashboard + Go API + Postgres + MinIO), runs Better Auth's one-time
  #     migration, then drives the browser folder drag-and-drop deploy through to
  #     a live site. The only job that exercises the browser DOM + React + the
  #     full prepare→upload→finalize→publish path end to end.
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e (browser · full stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: prepare env (safe local-dev defaults)
        run: cp deploy/.env.example deploy/.env

      - name: boot the stack
        run: docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build

      - name: run Better Auth migration (owns the auth schema)
        run: |
          for i in $(seq 1 30); do
            if docker compose -f deploy/docker-compose.yml --env-file deploy/.env exec -T dashboard \
                 pnpm dlx @better-auth/cli@1.3.4 migrate --yes; then
              echo "better-auth migrate ok"; exit 0
            fi
            echo "retry better-auth migrate ($i)"; sleep 5
          done
          echo "better-auth migrate failed"; exit 1

      - name: wait for the dashboard
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/auth/ok || true)
            [ "$code" = "200" ] && { echo "dashboard ready"; exit 0; }
            sleep 3
          done
          echo "dashboard never became ready"; docker compose -f deploy/docker-compose.yml logs dashboard | tail -80; exit 1

      - name: enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: install workspace deps
        run: pnpm install --frozen-lockfile

      - name: install Playwright chromium
        run: pnpm --filter @shipped/dashboard exec playwright install --with-deps chromium

      - name: run deploy e2e
        run: pnpm --filter @shipped/dashboard test:e2e

      - name: stack logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.yml logs --tail 200

      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          retention-days: 7
