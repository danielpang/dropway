# fly.toml app configuration file generated for dropway-mcp on 2026-06-19T18:27:26Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "dropway-mcp"
primary_region = "iad"   # match the API / Supabase region

[build]
  dockerfile = "services/mcp/Dockerfile"

[http_service]
  internal_port = 8092
  force_https = true
  # Low-traffic but on the OAuth path; keep one machine up to avoid cold starts.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  checks = [{ grace_period = '10s', interval = '15s', method = 'GET', path = '/healthz', timeout = '2s' }]
  concurrency = { hard_limit = 150, soft_limit = 100, type = 'requests' }

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 150

[[http_service.checks]]
  method = "GET"
  path = "/healthz"
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
