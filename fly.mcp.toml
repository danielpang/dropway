# fly.toml app configuration file generated for dropway-mcp-prod on 2026-06-19T16:41:25Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dropway-mcp-prod'
primary_region = 'iad'

[build]
  dockerfile = 'services/mcp/Dockerfile'

[http_service]
  internal_port = 8092
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 150
    soft_limit = 100

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
