# fly.toml app configuration file generated for dropway-mcp on 2026-06-19T18:27:26Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "dropway-mcp"
primary_region = "iad"   # match the API / Supabase region

[build]
  dockerfile = "services/mcp/Dockerfile"

[http_service]
  internal_port = 8092
  force_https = true
  # Low-traffic but on the OAuth path; keep one machine up to avoid cold starts.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 150

# /healthz now round-trips the database (see services/mcp/cmd/mcp/main.go), so a
# misconfigured/unreachable DATABASE_URL fails the check and the deploy instead of
# silently 403ing every request. Run it once a minute (not every 15s) to keep the
# DB round-trip cheap; timeout has headroom over the handler's 3s DB-ping budget.
[[http_service.checks]]
  method = "GET"
  path = "/healthz"
  interval = "60s"
  timeout = "5s"
  grace_period = "10s"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
