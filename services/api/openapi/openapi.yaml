# SPDX-License-Identifier: FSL-1.1-Apache-2.0
#
# Dropway control-plane API (api.dropway.dev) — the system of record and authz
# boundary. The dashboard generates its typed TS client
# from THIS spec; the frontend's contract is the API, never the DB. Keep this
# accurate: every path/shape here is implemented in services/api/internal/handlers.
#
# Phase 1 surface: identity echo, sites CRUD (create/list/get), and the deploy
# loop (prepare → finalize → publish). Access modes other than `public`, billing,
# and the gated /authz exchange are later phases.

openapi: 3.1.0

info:
  title: Dropway API
  version: "1.0.0-phase2"
  description: >
    The Dropway control plane. Most /v1 routes require a Bearer EdDSA JWT
    (issued by Better Auth) which the Go API verifies itself (the authz boundary).
    Every request runs under a Postgres RLS tenant context derived from the
    verified org_id/user_id claims.


    Phase 2 adds access control & domains: the /authz viewer exchange (mint +
    password) which issues a host-scoped EdDSA edge token the serving Worker
    verifies (public JWKS at /.well-known/edge-jwks), per-site access-mode + policy
    management (admin/owner only), allowlist CRUD, the org allow_external_sharing
    toggle (with reconcile), member listing, and Cloudflare-for-SaaS custom domains.
  license:
    name: FSL-1.1-Apache-2.0

servers:
  - url: https://api.dropway.dev
    description: Production
  - url: http://localhost:8080
    description: Local / self-host

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      summary: Liveness probe (unauthenticated)
      security: []
      operationId: healthz
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /.well-known/edge-jwks:
    get:
      summary: Edge-token JWKS (unauthenticated)
      description: >
        The public JWKS (OKP/Ed25519) for the edge-token signer. The serving Worker
        fetches this and pins alg=EdDSA to verify the host-scoped edge token. This
        is a SEPARATE keypair from Better Auth's user JWKS.
      security: []
      operationId: edgeJwks
      responses:
        "200":
          description: The edge signer's public JWKS
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JWKS" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /v1/authz/mint:
    post:
      summary: Mint a host-scoped edge token for an org_only/allowlist site
      description: >
        Authorizes the VERIFIED viewer (Better Auth JWT) for the org_only/allowlist
        site resolved from {host} and mints a host-scoped EdDSA edge token (sub =
        viewer). Re-checks live tables: org membership for org_only; the viewer's
        VERIFIED email on the allowlist for allowlist (claiming a pending entry on
        first match; external grants require allow_external_sharing). An expired
        policy refuses the mint (403). A password-mode site → 400 (use /authz/password).
      operationId: authzMint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host]
              properties:
                host: { type: string, description: Content host (e.g. acme.dropwaycontent.com or a verified custom host) }
                next: { type: string, description: Path the dashboard redirects back to (NOT used for authz) }
      responses:
        "200":
          description: Minted edge token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EdgeToken" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /v1/authz/password:
    post:
      summary: Mint an anonymous edge token for a password-protected site
      description: >
        JWT-FREE. Verifies the submitted password against the site's bcrypt hash
        (constant-time compare) and, on success, mints an ANONYMOUS host-scoped edge
        token (sub = "anon:<random>"). Wrong password → 401; an expired policy →
        403; a non-password / unknown host → a generic 401 (no existence oracle).
      security: []
      operationId: authzPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host, password]
              properties:
                host: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Minted anonymous edge token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EdgeToken" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /v1/me:
    get:
      summary: Echo the caller's verified identity
      operationId: getMe
      responses:
        "200":
          description: The verified claims
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/members:
    get:
      summary: List the caller org's members
      description: >
        Lists members from the Better Auth `member` table, RLS/org-scoped. The Go
        API only READS roles (Better Auth owns invite/accept/role mutations). If the
        Better Auth table is unavailable (self-host pre-Better-Auth), returns an
        empty list.
      operationId: listMembers
      responses:
        "200":
          description: The org's members
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items: { $ref: "#/components/schemas/Member" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/storage:
    get:
      summary: Logical storage usage per user for the caller org
      description: >
        Per-user LOGICAL storage for the active org: each user's total is the sum of
        their sites' current-version sizes. "Logical" means NOT deduplicated (a file
        shipped by two users counts for both — the per-folder model of Dropbox/Drive).
        Display-only attribution for the members page, NOT an entitlement; the
        authoritative deduplicated org footprint is metered separately. Users with no
        sites are omitted (render as 0). Any org member may read it (org-scoped).
      operationId: storageUsage
      responses:
        "200":
          description: Per-user logical storage, sorted by user id
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items: { $ref: "#/components/schemas/UserStorage" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/orgs/allow-external-sharing:
    put:
      summary: Toggle the org allow_external_sharing policy (admin/owner only)
      description: >
        Owner/admin only (role re-checked against the member table). When DISABLING,
        reconciles: public sites are downgraded to org_only and their edge routes
        rewritten; external-email allowlist grants are revoked. Enabling only widens
        what is permitted (no reconcile).
      operationId: setAllowExternalSharing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: The new policy + the number of downgraded sites
          content:
            application/json:
              schema:
                type: object
                properties:
                  allow_external_sharing: { type: boolean }
                  downgraded_sites: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/orgs/policy:
    get:
      summary: Read the caller org's policy (live toggle state)
      description: >
        Any member may read it (it drives the org's own settings UI). Returns the
        live allow_external_sharing flag and mcp_enabled flag. Writing the values
        stays admin/owner only (allow-external-sharing / mcp endpoints).
      operationId: getOrgPolicy
      responses:
        "200":
          description: The org's current policy
          content:
            application/json:
              schema:
                type: object
                properties:
                  allow_external_sharing: { type: boolean }
                  mcp_enabled: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/orgs/mcp:
    patch:
      summary: Toggle whether the Dropway MCP server may serve this org (admin/owner only)
      description: >
        Owner/admin only (role re-checked against the member table). Flips
        org_meta.mcp_enabled. The MCP resource server re-checks this flag per request,
        so disabling takes effect immediately even for already-issued OAuth access
        tokens (no edge reconcile needed). Default enabled.
      operationId: setMcpEnabled
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: The new mcp_enabled value
          content:
            application/json:
              schema:
                type: object
                properties:
                  mcp_enabled: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/domains/{domainID}:
    delete:
      summary: Remove a custom domain (admin/owner only)
      description: >
        Deletes the custom domain: removes the global host route (so the custom host
        stops serving immediately), then best-effort deletes the edge route
        projection and the Cloudflare custom hostname. Owner/admin only.
      operationId: deleteDomain
      parameters:
        - name: domainID
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Removed }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /v1/domains/{domainID}/status:
    get:
      summary: Poll a custom domain's verification status
      description: >
        Polls Cloudflare for the custom hostname's verification + TLS state, advances
        the pending→verifying→active state machine, and — on verified+TLS — writes
        the global host route → site so the custom host serves.
      operationId: getDomainStatus
      parameters:
        - name: domainID
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The updated domain row
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Domain" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /v1/feed:
    get:
      summary: The org feed — sites and skills shared across the org, newest first
      description: >
        Returns every site AND skill in the caller's org that is feed-visible (not
        marked private), newest first so freshly created/published posts are at the
        top and older ones sink to the bottom. The cross-user discovery surface that
        complements the per-user site/skill lists. Any org member may read it
        (RLS-scoped to their org). Each item carries a `kind` ("site" | "skill") so
        the dashboard renders the right card, link, and badges; the site-only fields
        (access_mode, live_url, storage_bytes) and skill-only fields (is_seeded,
        size_bytes) are omitted for the other kind.
      operationId: listFeed
      responses:
        "200":
          description: The org's shared posts (sites + skills), newest first
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items: { $ref: "#/components/schemas/FeedItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/sites:
    post:
      summary: Create a site
      description: >
        Reserved slugs are rejected (400). A slug whose content host
        (`<slug>.dropwaycontent.com`) is already taken by another org/site
        returns 409 Conflict — the host registry is global even though site slugs
        are unique only per org. On the cloud build, exceeding the per-user site
        cap returns 402 with the quota body so the dashboard can open the upgrade
        modal.
      operationId: createSite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug:
                  type: string
                  description: Subdomain label under dropwaycontent.com (unique per org).
                  example: my-docs
      responses:
        "201":
          description: Site created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Site" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402": { $ref: "#/components/responses/QuotaExceeded" }
        "409": { $ref: "#/components/responses/Conflict" }
    get:
      summary: List the caller org's sites
      operationId: listSites
      responses:
        "200":
          description: The org's sites
          content:
            application/json:
              schema:
                type: object
                properties:
                  sites:
                    type: array
                    items: { $ref: "#/components/schemas/Site" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/sites/{id}:
    get:
      summary: Get one site
      operationId: getSite
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      responses:
        "200":
          description: The site
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Site" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sites/{id}/versions:
    get:
      summary: List a site's deploy history (newest first)
      description: >
        Returns every immutable version of the site, newest first, each flagged with
        whether it is the live version. Drives the dashboard rollback picker.
      operationId: listVersions
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      responses:
        "200":
          description: The site's versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items: { $ref: "#/components/schemas/SiteVersion" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sites/{id}/deployments/prepare:
    post:
      summary: Prepare a deployment — discover missing blobs + presigned uploads
      description: >
        Given the deploy manifest, returns the subset of referenced blobs not
        already present for the org (only-changed-blob upload) and a presigned PUT
        URL for each. Blob keys are derived server-side from the org + sha256.
      operationId: prepareDeployment
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [manifest]
              properties:
                manifest:
                  type: array
                  items: { $ref: "#/components/schemas/ManifestFile" }
      responses:
        "200":
          description: Missing blobs + presigned upload URLs
          content:
            application/json:
              schema:
                type: object
                properties:
                  missing:
                    type: array
                    items: { type: string, description: sha256 (lowercase hex) }
                  uploads:
                    type: object
                    additionalProperties:
                      type: string
                      format: uri
                    description: sha256 → presigned PUT URL
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sites/{id}/deployments:
    post:
      summary: Finalize a deployment — verify blobs, write the immutable version
      description: >
        Server-verifies that every referenced blob is present AND its stored bytes
        hash equals the claimed sha256, writes the immutable per-deploy manifest to
        object storage, and inserts an immutable site_version (status=ready, next
        version_no). Idempotent on the per-site content digest.
      operationId: finalizeDeployment
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [manifest, digest]
              properties:
                manifest:
                  type: array
                  items: { $ref: "#/components/schemas/ManifestFile" }
                digest:
                  type: string
                  description: Whole-deploy content address (sha256, lowercase hex). The version's content_hash + idempotency key.
      responses:
        "201":
          description: Immutable version created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Version" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sites/{id}/publish:
    post:
      summary: Publish (or roll back to) a version
      description: >
        Flips the site's live-version pointer to version_id and writes the edge
        routing projection (KV route:<host>). Rollback is just publishing an older
        version_id. The pointer flip is Postgres-authoritative; the projection is a
        rebuildable cache.
      operationId: publish
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version_id]
              properties:
                version_id: { type: string, format: uuid }
      responses:
        "200":
          description: Published; the site is live
          content:
            application/json:
              schema:
                type: object
                properties:
                  live_url: { type: string, format: uri }
                  version_id: { type: string, format: uuid }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sites/{id}/access:
    put:
      summary: Set a site's access mode + policy (admin/owner only)
      description: >
        Owner/admin only (role re-checked against the member table). Sets the
        access_mode (public/password/allowlist/org_only) and the matching policy:
        a password mode's password is hashed server-side (bcrypt; plaintext is never
        stored), optional expires_at (RFC3339) sets a link expiry, unlisted marks a
        public-tier site as unlisted. Rewrites the edge RouteValue (mode + expires_at
        for the public tier). A public site under allow_external_sharing=false → 403.
      operationId: setSiteAccess
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode: { type: string, enum: [public, password, allowlist, org_only] }
                password: { type: string, description: Plaintext; hashed server-side. Required for mode=password. }
                expires_at: { type: string, format: date-time, description: Optional link expiry (RFC3339). }
                unlisted: { type: boolean, description: Public-tier unlisted flag. }
      responses:
        "200":
          description: Access updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  site_id: { type: string, format: uuid }
                  mode: { type: string }
                  unlisted: { type: boolean }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sites/{id}/feed:
    put:
      summary: Share a site to the org feed, or make it private (owner or admin)
      description: >
        Toggles whether the site appears in the org feed. Unlike the access
        endpoints (admin/owner only), the site's OWNER may toggle their own site's
        feed visibility, and an org admin/owner may toggle any site. Feed visibility
        is the discovery axis — orthogonal to access_mode — so this changes nothing
        at the edge: a private site keeps serving under its existing access mode, it
        is just hidden from the feed listing.
      operationId: setSiteFeedVisibility
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visible]
              properties:
                visible:
                  type: boolean
                  description: true shares the site to the org feed; false makes it private.
      responses:
        "200":
          description: Feed visibility updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  site_id: { type: string, format: uuid }
                  feed_visible: { type: boolean }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sites/{id}/feed-meta:
    put:
      summary: Set a site's feed title + description (owner or admin)
      description: >
        Sets the human-facing Title and Description the site shows in the org feed.
        Authorized for the site's owner or an org admin/owner (same gate as the
        feed-visibility toggle). Empty strings clear the corresponding field.
      operationId: setSiteFeedMeta
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string, description: Human title (empty clears it; max 120 chars). }
                description: { type: string, description: Description (empty clears it; max 500 chars). }
      responses:
        "200":
          description: Feed metadata updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  site_id: { type: string, format: uuid }
                  title: { type: string }
                  description: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sites/{id}/vote:
    put:
      summary: Up/down vote a feed post (any org member)
      description: >
        Records the caller's vote on a site: value 1 (up), -1 (down), or 0 to clear
        it. One vote per member per site. Returns the post's new net score and the
        caller's resulting vote.
      operationId: setSiteVote
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: integer
                  enum: [-1, 0, 1]
                  description: 1 upvote, -1 downvote, 0 clears the caller's vote.
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  site_id: { type: string, format: uuid }
                  score: { type: integer, format: int64 }
                  my_vote: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sites/{id}/comments:
    get:
      summary: List a site's comment thread (oldest first)
      description: >
        The site's org-internal comment thread, oldest first. Any org member may
        read it (RLS-scoped to their org).
      operationId: listComments
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      responses:
        "200":
          description: The site's comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items: { $ref: "#/components/schemas/SiteComment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      summary: Post a comment to a site, optionally tagging teammates
      description: >
        Any org member may comment; the author is the authenticated caller. Tagged
        ids that aren't current org members are dropped so a mention always resolves
        to a real teammate.
      operationId: addComment
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, description: The comment text (max 4000 chars). }
                mentioned_user_ids:
                  type: array
                  description: Org users to tag. Non-members are dropped server-side.
                  items: { type: string, format: uuid }
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SiteComment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sites/{id}/allowlist:
    get:
      summary: List a site's allowlist
      operationId: listAllowlist
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      responses:
        "200":
          description: The site's allowlist
          content:
            application/json:
              schema:
                type: object
                properties:
                  allowlist:
                    type: array
                    items: { $ref: "#/components/schemas/AllowlistEntry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      summary: Add an email to a site's allowlist (admin/owner only)
      description: >
        Owner/admin only. is_external is set automatically when the email's domain is
        not one of the org's VERIFIED domains; the DB trigger then rejects an external
        grant under allow_external_sharing=false (403).
      operationId: addAllowlistEntry
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "201":
          description: Entry added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AllowlistEntry" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Remove an email from a site's allowlist (admin/owner only)
      operationId: removeAllowlistEntry
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Entry removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sites/{id}/domains:
    get:
      summary: List a site's custom domains
      operationId: listDomains
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      responses:
        "200":
          description: The site's custom domains
          content:
            application/json:
              schema:
                type: object
                properties:
                  domains:
                    type: array
                    items: { $ref: "#/components/schemas/Domain" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      summary: Register a custom domain for a site (admin/owner only)
      description: >
        Owner/admin only. Custom domains are a PAID feature: a free-tier org is
        rejected with 402 (upgrade body) before any provisioning. Otherwise creates
        a Cloudflare-for-SaaS custom hostname and stores a pending domains row,
        returning the DNS DCV record the user must create. hostname is GLOBALLY
        UNIQUE → 409 if taken by another org/site.
      operationId: addDomain
      parameters:
        - { $ref: "#/components/parameters/SiteID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostname]
              properties:
                hostname: { type: string, example: docs.acme.com }
      responses:
        "201":
          description: Custom domain registered (pending verification)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Domain" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402": { $ref: "#/components/responses/QuotaExceeded" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "503": { $ref: "#/components/responses/Unavailable" }

  # ===========================================================================
  # Billing (CLOUD-ONLY / PROPRIETARY).
  #
  # These paths exist ONLY in the hosted-cloud build (compiled under the `cloud`
  # Go build tag and mounted by mountCloud). The open-source / self-host build
  # does NOT serve /webhooks/stripe or /v1/billing/* — self-host is unlimited and
  # has no Stripe. They are documented here for the cloud client; a self-host
  # client will get 404 on them, which is expected.
  #
  # CRITICAL invariant: the paid entitlement (plan_tier) is written to the DB ONLY
  # by the signature-verified /webhooks/stripe handler — never by the browser's
  # success redirect. Checkout/Portal only START a Stripe-hosted flow.
  # ===========================================================================

  /webhooks/stripe:
    post:
      summary: "[CLOUD-ONLY] Stripe webhook (JWT-FREE, signature-verified)"
      description: >
        The Stripe webhook endpoint. UNAUTHENTICATED (no Better Auth JWT) but
        SIGNATURE-VERIFIED against STRIPE_WEBHOOK_SECRET via the Stripe-Signature
        header. The handler (1) verifies the signature (else 400, no DB write),
        (2) dedupes by Stripe event id (replay → 200 no-op), (3) maps the event to
        a plan_tier change and persists it (the ONLY writer of plan_tier). This is
        the source of truth for entitlement. checkout.session.completed /
        customer.subscription.created|updated → upsert subscription + raise
        plan_tier; customer.subscription.deleted → downgrade to Free + org_status
        (over_limit if the org now exceeds Free caps), NEVER deleting data.
      operationId: stripeWebhook
      security: []
      tags: [billing-cloud]
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema: { type: string }
          description: "Stripe's t=<ts>,v1=<hmac> signature over the raw body."
      requestBody:
        required: true
        description: The raw Stripe event JSON (verified against the signature).
        content:
          application/json:
            schema: { type: object, description: A Stripe Event object. }
      responses:
        "200":
          description: Processed (or acknowledged duplicate / unhandled type).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
        "400":
          description: Invalid or missing signature — nothing is persisted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "405": { $ref: "#/components/responses/Error405" }
        "500": { $ref: "#/components/responses/Error500" }

  /v1/billing:
    get:
      summary: "[CLOUD-ONLY] Get the org's current plan"
      description: >
        Returns the org's authoritative plan (read from app.org_meta) plus the
        subscription status / org_status / seats if a subscription row exists. Any
        authenticated member may read it (it drives the dashboard's plan banner and
        upgrade CTA); billing WRITES still require owner/admin.
      operationId: getBilling
      tags: [billing-cloud]
      responses:
        "200":
          description: The org's current plan.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BillingPlan" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Cloud build not present (self-host) — route does not exist.

  /v1/billing/checkout:
    post:
      summary: "[CLOUD-ONLY] Start a Stripe Checkout session (owner/admin)"
      description: >
        Owner/admin only. Ensures a Stripe Customer for the org (one per org,
        persisting stripe_customer_id), then creates a subscription-mode Checkout
        Session for {target_tier} with client_reference_id=org_id and
        metadata{org_id,target_tier} so the signed webhook can resolve + entitle the
        org. Returns the Stripe-hosted checkout_url. The success redirect grants
        NOTHING — only the webhook flips plan_tier.
      operationId: createCheckout
      tags: [billing-cloud]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_tier]
              properties:
                target_tier: { type: string, enum: [pro, business, enterprise] }
                seats: { type: integer, format: int64, minimum: 1, description: "Seats (defaults to 1)." }
                local_currency: { type: boolean, description: "Enable Adaptive Pricing (local-currency presentment; Stripe converts from USD). Default false = billed in USD, the customer's bank does the FX." }
      responses:
        "200":
          description: A Stripe Checkout Session URL to redirect the user to.
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkout_url: { type: string, format: uri }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/billing/portal:
    post:
      summary: "[CLOUD-ONLY] Open the Stripe Billing Portal (owner/admin)"
      description: >
        Owner/admin only. Creates a Stripe Billing Portal session for the org's
        existing Stripe Customer (self-serve seat/plan/payment-method/cancel) and
        returns the portal_url. 409 if the org has no Stripe customer yet (run
        Checkout first).
      operationId: createPortal
      tags: [billing-cloud]
      responses:
        "200":
          description: A Stripe Billing Portal URL to redirect the user to.
          content:
            application/json:
              schema:
                type: object
                properties:
                  portal_url: { type: string, format: uri }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/skills:
    post:
      summary: Create a shared skill (metadata; content arrives via uploads)
      description: >
        Registers a skill for the org. `folders` optionally attaches it to
        folders immediately; the free tier's 10-skills-per-folder cap returns
        402. Content is uploaded afterwards via the prepare→finalize flow.
      operationId: createSkill
      tags: [skills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug: { type: string, description: Org-unique skill name (DNS-label grammar), e.g. pr-review-checklist. }
                title: { type: string }
                folders:
                  type: array
                  items: { type: string, format: uuid }
                  description: Folder ids to join on create.
      responses:
        "201":
          description: Skill created
          content:
            application/json:
              schema:
                type: object
                properties:
                  skill: { $ref: "#/components/schemas/Skill" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402": { $ref: "#/components/responses/QuotaExceeded" }
        "404": { $ref: "#/components/responses/NotFound" }
    get:
      summary: List / search the org's skills
      description: >
        `q` matches slug/title/description (substring); `folder` filters to one
        folder's members by folder slug; `presets=true` restricts to
        admin-curated preset members. Skills with no finalized upload are
        visible only to their owner.
      operationId: listSkills
      tags: [skills]
      parameters:
        - { name: q, in: query, required: false, schema: { type: string } }
        - { name: folder, in: query, required: false, schema: { type: string }, description: Folder slug. }
        - { name: presets, in: query, required: false, schema: { type: string, enum: ["true"] } }
      responses:
        "200":
          description: Matching skills
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items: { $ref: "#/components/schemas/Skill" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/skills/{id}:
    get:
      summary: Get one skill
      operationId: getSkill
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillID" }
      responses:
        "200":
          description: The skill
          content:
            application/json:
              schema:
                type: object
                properties:
                  skill: { $ref: "#/components/schemas/Skill" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Delete a skill (owner or org admin)
      operationId: deleteSkill
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillID" }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/skills/{id}/uploads/prepare:
    post:
      summary: Prepare a skill upload — validate + presigned uploads
      description: >
        Validates the manifest against the skill rules (a root SKILL.md, ≤ 200
        files, ≤ 5 MiB total, clean relative paths) BEFORE any bytes move, then
        returns the blobs the org doesn't already have with a presigned PUT URL
        each — the same contract as deployment prepare. Owner-or-admin.
      operationId: prepareSkillUpload
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [manifest]
              properties:
                manifest:
                  type: array
                  items: { $ref: "#/components/schemas/ManifestFile" }
      responses:
        "200":
          description: Missing blobs + presigned PUT URLs
          content:
            application/json:
              schema:
                type: object
                properties:
                  missing:
                    type: array
                    items: { type: string }
                  uploads:
                    type: object
                    additionalProperties: { type: string, format: uri }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/skills/{id}/uploads:
    post:
      summary: Finalize a skill upload (latest-only — finalize publishes)
      description: >
        Server-verifies every blob (stored bytes hash == key), re-asserts the
        skill rules against server-observed sizes, parses SKILL.md frontmatter
        to fill empty title/description, inserts the immutable version, and
        flips the skill's live pointer in the same transaction. Idempotent on
        the whole-upload digest. Owner-or-admin.
      operationId: finalizeSkillUpload
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [manifest, digest]
              properties:
                manifest:
                  type: array
                  items: { $ref: "#/components/schemas/ManifestFile" }
                digest:
                  type: string
                  description: sha256 over the sorted "<sha256>  <path>\n" manifest lines.
      responses:
        "201":
          description: Version finalized + published
          content:
            application/json:
              schema:
                type: object
                properties:
                  version_id: { type: string, format: uuid }
                  version_no: { type: integer }
                  warnings:
                    type: array
                    items: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402": { $ref: "#/components/responses/QuotaExceeded" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/skills/{id}/folders:
    put:
      summary: Replace a skill's folder memberships (owner or admin)
      description: >
        PUT semantics — the body is the complete new set of folder ids. Preset
        flags on kept folders survive; the free-tier per-folder cap applies to
        newly-gained memberships (402).
      operationId: setSkillFolders
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [folders]
              properties:
                folders:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                type: object
                properties:
                  skill: { $ref: "#/components/schemas/Skill" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402": { $ref: "#/components/responses/QuotaExceeded" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/skills/{id}/files:
    get:
      summary: List the current version's files
      operationId: listSkillFiles
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillID" }
      responses:
        "200":
          description: Manifest entries of the current version
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items: { $ref: "#/components/schemas/SkillFile" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/skills/{id}/download:
    get:
      summary: Download a skill's files inline
      description: >
        Returns the current version's files, utf8 text inline and binary
        base64-encoded — the shape clients write straight into
        .claude/skills/<slug>/. Bounded by the 5 MiB per-skill cap.
      operationId: downloadSkill
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillID" }
      responses:
        "200":
          description: The skill's files
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SkillDownload" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/skills/{id}/feed:
    put:
      summary: Share a skill to the org feed, or make it private (owner or admin)
      description: >
        Toggles whether the skill appears in the org feed. The skill's OWNER may
        toggle their own skill; an org admin/owner may toggle any. Mirror of the
        site feed-visibility toggle. A skill auto-joins the feed on publish.
      operationId: setSkillFeedVisibility
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visible]
              properties:
                visible:
                  type: boolean
                  description: true shares the skill to the org feed; false makes it private.
      responses:
        "200":
          description: Feed visibility updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  kind: { type: string, enum: [skill] }
                  id: { type: string, format: uuid }
                  feed_visible: { type: boolean }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/skills/{id}/feed-meta:
    put:
      summary: Set a skill's feed title + description (owner or admin)
      description: >
        Sets the skill's Title and Description (which double as its feed post's
        title/description). Owner-or-admin. Empty strings clear the field.
      operationId: setSkillFeedMeta
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string, description: Human title (empty clears it; max 120 chars). }
                description: { type: string, description: Description (empty clears it; max 500 chars). }
      responses:
        "200":
          description: Feed metadata updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  kind: { type: string, enum: [skill] }
                  id: { type: string, format: uuid }
                  title: { type: string }
                  description: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/skills/{id}/vote:
    put:
      summary: Up/down vote a skill feed post (any org member)
      description: >
        Records the caller's vote on a skill: value 1 (up), -1 (down), or 0 to clear
        it. One vote per member per skill. Returns the new net score + the caller's
        resulting vote. A skill made private accepts no votes.
      operationId: setSkillVote
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: integer
                  enum: [-1, 0, 1]
                  description: 1 upvote, -1 downvote, 0 clears the caller's vote.
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  kind: { type: string, enum: [skill] }
                  id: { type: string, format: uuid }
                  score: { type: integer, format: int64 }
                  my_vote: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/skills/{id}/comments:
    get:
      summary: List a skill's comment thread (oldest first)
      description: >
        The skill's org-internal comment thread, oldest first. Any org member may
        read it (RLS-scoped to their org).
      operationId: listSkillComments
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillID" }
      responses:
        "200":
          description: The skill's comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items: { $ref: "#/components/schemas/SiteComment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      summary: Post a comment to a skill, optionally tagging teammates
      description: >
        Any org member may comment; the author is the authenticated caller. Tagged
        ids that aren't current org members are dropped so a mention always resolves
        to a real teammate.
      operationId: addSkillComment
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, description: The comment text (max 4000 chars). }
                mentioned_user_ids:
                  type: array
                  description: Org users to tag. Non-members are dropped server-side.
                  items: { type: string, format: uuid }
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SiteComment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/skill-folders:
    get:
      summary: List the org's skill folders
      operationId: listSkillFolders
      tags: [skills]
      responses:
        "200":
          description: The org's folders (with item counts)
          content:
            application/json:
              schema:
                type: object
                properties:
                  folders:
                    type: array
                    items: { $ref: "#/components/schemas/SkillFolder" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create a folder (admin/owner)
      operationId: createSkillFolder
      tags: [skills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug: { type: string }
                title: { type: string }
      responses:
        "201":
          description: Folder created
          content:
            application/json:
              schema:
                type: object
                properties:
                  folder: { $ref: "#/components/schemas/SkillFolder" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/skill-folders/{id}:
    patch:
      summary: Rename a folder (admin/owner; the slug is immutable)
      operationId: renameSkillFolder
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillFolderID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
      responses:
        "200":
          description: Renamed folder
          content:
            application/json:
              schema:
                type: object
                properties:
                  folder: { $ref: "#/components/schemas/SkillFolder" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Delete a folder (admin/owner; skills survive)
      operationId: deleteSkillFolder
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillFolderID" }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/skill-folders/{id}/items:
    post:
      summary: Add a skill to a folder
      description: >
        Admins may add any skill and set is_preset; a skill's owner may add
        their own skill (never as a preset). A genuinely-new membership past
        the free-tier per-folder cap returns 402.
      operationId: addSkillFolderItem
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillFolderID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [skill_id]
              properties:
                skill_id: { type: string, format: uuid }
                is_preset: { type: boolean }
      responses:
        "200":
          description: Added
          content:
            application/json:
              schema:
                type: object
                properties:
                  added: { type: boolean }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402": { $ref: "#/components/responses/QuotaExceeded" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/skill-folders/{id}/items/{skillID}:
    delete:
      summary: Remove a skill from a folder (admin or skill owner)
      operationId: removeSkillFolderItem
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillFolderID" }
        - { name: skillID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      summary: Set a membership's preset flag (admin/owner)
      operationId: setSkillFolderItemPreset
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillFolderID" }
        - { name: skillID, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_preset]
              properties:
                is_preset: { type: boolean }
      responses:
        "200":
          description: Flag updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_preset: { type: boolean }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/skill-folders/{id}/download:
    get:
      summary: Bulk-download every skill in a folder
      description: >
        The "install the whole preset folder" affordance (any member). Inlines
        every finalized skill in the folder under a 50 MiB response budget;
        skills past the budget (or with a read error) come back as truncated
        stubs to fetch individually via GET /v1/skills/{id}/download.
      operationId: downloadSkillFolder
      tags: [skills]
      parameters:
        - { $ref: "#/components/parameters/SkillFolderID" }
      responses:
        "200":
          description: The folder's skills, inline
          content:
            application/json:
              schema:
                type: object
                properties:
                  folder: { $ref: "#/components/schemas/SkillFolder" }
                  skills:
                    type: array
                    items: { $ref: "#/components/schemas/SkillDownload" }
                  warnings:
                    type: array
                    items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived EdDSA JWT (Better Auth) or a deploy token.

  parameters:
    SiteID:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: app.sites.id
    SkillID:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: app.skills.id
    SkillFolderID:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: app.skill_folders.id

  schemas:
    Me:
      type: object
      properties:
        user_id: { type: string }
        org_id: { type: string }
        role: { type: string, enum: [owner, admin, member] }
        custom_domains_enabled:
          type: boolean
          description: >
            Whether custom domains are backed by a real provider (Cloudflare for
            SaaS). False in self-host/dev, where the dashboard hides the feature
            because it can never finish verification.

    Member:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        role: { type: string, enum: [owner, admin, member] }

    EdgeToken:
      type: object
      description: A minted host-scoped EdDSA edge token (the serving Worker verifies it).
      properties:
        token: { type: string, description: Compact EdDSA JWT (aud = the content host). }
        host: { type: string }
        mode: { type: string, enum: [password, allowlist, org_only] }

    AllowlistEntry:
      type: object
      properties:
        email: { type: string, format: email }
        is_external: { type: boolean }
        claimed_at: { type: string, format: date-time, nullable: true }
        claimed_by: { type: string, format: uuid, nullable: true }

    Domain:
      type: object
      properties:
        id: { type: string, format: uuid }
        site_id: { type: string, format: uuid }
        hostname: { type: string }
        verify_status: { type: string, enum: [pending, verifying, verified, failed] }
        tls_status: { type: string, enum: [pending, issued, failed] }
        dcv_record: { type: string, description: "DNS record to create: '<name> <type> <value>'." }

    JWKS:
      type: object
      description: JSON Web Key Set (OKP/Ed25519) for the edge-token signer.
      properties:
        keys:
          type: array
          items:
            type: object
            properties:
              kty: { type: string, example: OKP }
              crv: { type: string, example: Ed25519 }
              kid: { type: string }
              x: { type: string, description: base64url(raw public key) }
              use: { type: string, example: sig }
              alg: { type: string, example: EdDSA }

    Site:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        slug: { type: string }
        owner_id: { type: string, format: uuid }
        access_mode: { type: string, enum: [public, password, allowlist, org_only] }
        current_version_id: { type: string, format: uuid, nullable: true }
        live_url: { type: string, format: uri }
        storage_bytes:
          type: integer
          format: int64
          description: >
            The site's LOGICAL storage in bytes: the size of its current live
            version (0 before the first deploy). "Logical" means NOT deduplicated
            across sites/versions — the per-folder size you'd expect from Dropbox or
            Drive, not the org's billed footprint.
        feed_visible:
          type: boolean
          description: >
            Whether the site appears in the org feed (the cross-user discovery
            surface). Defaults to true: a site is auto-shared to the feed on create
            and publish. The owner (or an admin) sets it false to keep the site
            private — off the feed. Orthogonal to access_mode (this never changes
            who can load the served bytes).
        title:
          type: string
          description: >
            Owner-set human title shown in the org feed (empty when unset — the
            feed falls back to the slug).
        description:
          type: string
          description: Owner-set description shown in the org feed (empty when unset).
        created_at: { type: string, format: date-time }

    FeedItem:
      type: object
      description: >
        One post in the unified org feed: a site OR a skill, tagged by `kind`, plus
        its social metadata (net vote score, the caller's own vote, comment count).
        Site-only fields (access_mode, live_url, storage_bytes) and skill-only fields
        (is_seeded, size_bytes) are present only for the matching kind.
      required: [kind, id, slug, owner_id, created_at]
      properties:
        kind:
          type: string
          enum: [site, skill]
          description: What this post is — a shared site or a shared skill.
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        slug: { type: string }
        owner_id: { type: string, format: uuid, description: The post's owner (the all-zero uuid for Dropway-seeded skills). }
        title: { type: string, description: Owner-set feed title (empty → clients fall back to the slug). }
        description: { type: string }
        current_version_id: { type: string, format: uuid, nullable: true }
        feed_visible: { type: boolean, description: Whether the post is shared to the feed (always true for items the feed returns). }
        created_at: { type: string, format: date-time }
        access_mode: { type: string, enum: [public, password, allowlist, org_only], description: Site-only — the edge access mode. }
        live_url: { type: string, description: Site-only — the canonical served URL. }
        storage_bytes: { type: integer, format: int64, description: Site-only — logical current-version size. }
        is_seeded: { type: boolean, description: Skill-only — a Dropway-provided preset. }
        size_bytes: { type: integer, format: int64, description: Skill-only — current-version content size. }
        score:
          type: integer
          format: int64
          description: Net up/down vote total (sum of +1/-1).
        my_vote:
          type: integer
          description: The caller's own vote on this post (1, -1, or 0).
        comment_count:
          type: integer
          format: int64
          description: Number of comments on this post.

    SiteComment:
      type: object
      description: >
        One org-internal comment on a feed post (a site or a skill), optionally
        tagging teammates. subject_type + subject_id identify the post it's on.
      properties:
        id: { type: string, format: uuid }
        subject_type: { type: string, enum: [site, skill] }
        subject_id: { type: string, format: uuid }
        author_id: { type: string, format: uuid }
        body: { type: string }
        mentioned_user_ids:
          type: array
          description: The org users tagged in the comment (identity ids).
          items: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    UserStorage:
      type: object
      description: One user's logical storage total in the org (bytes).
      properties:
        user_id: { type: string, format: uuid }
        bytes: { type: integer, format: int64 }

    Version:
      type: object
      properties:
        version_id: { type: string, format: uuid }
        version_no: { type: integer }
        preview_url: { type: string, format: uri }
        warnings:
          type: array
          items: { type: string }
          description: >-
            Non-fatal advisories about the finalized deploy. The deploy still
            succeeds; clients surface these. Today the only warning is a missing
            root index.html (the site root URL would 404).

    SiteVersion:
      type: object
      description: One immutable deploy in a site's history.
      properties:
        id: { type: string, format: uuid }
        version_no: { type: integer }
        status: { type: string }
        size_bytes: { type: integer, format: int64 }
        content_hash: { type: string }
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        is_current:
          type: boolean
          description: Whether this is the version the site is currently serving.

    ManifestFile:
      type: object
      required: [path, sha256, size]
      properties:
        path:
          type: string
          description: Request path served from the site (e.g. index.html, assets/app.js).
        sha256:
          type: string
          description: Content hash (lowercase hex). The server derives the R2 key from org + this.
        size: { type: integer, format: int64 }
        content_type: { type: string }

    Skill:
      type: object
      description: >
        An org-shared Claude skill: a directory with a root SKILL.md plus
        supporting files, content-addressed like a deploy. Versions are
        immutable but v1 exposes only the current one (finalize publishes).
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        slug: { type: string }
        owner_id:
          type: string
          format: uuid
          description: The uploader (the all-zero uuid for Dropway-seeded presets).
        is_seeded:
          type: boolean
          description: >
            True when the skill is a Dropway-provided preset. Clients render the
            owner as "Dropway" from this flag rather than matching the sentinel
            owner_id themselves.
        title: { type: string, description: From the create request or SKILL.md frontmatter (empty when unset). }
        description: { type: string }
        current_version_id: { type: string, format: uuid, nullable: true }
        size_bytes: { type: integer, format: int64, description: Current version's total content size (0 before the first upload). }
        version:
          type: integer
          description: >
            Current version's monotonic number (0 before the first upload). Bumps
            on every content change; CLI/MCP compare it against a downloaded
            skill's recorded version to detect updates.
        feed_visible:
          type: boolean
          description: >
            Whether the skill is shared to the org feed (default true on publish).
            The owner/admin can make it private to pull it off the feed.
        folders:
          type: array
          items: { $ref: "#/components/schemas/SkillFolderRef" }
        created_at: { type: string, format: date-time }

    SkillFolderRef:
      type: object
      description: One folder membership as seen from a skill.
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        title: { type: string }
        is_preset: { type: boolean, description: Admin-curated preset membership (the starter set bulk download surfaces). }

    SkillFolder:
      type: object
      description: An admin-curated skill folder (defaults engineering/product/marketing, seeded per org).
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        title: { type: string }
        item_count: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }

    SkillFile:
      type: object
      description: One manifest entry of a skill's current version.
      properties:
        path: { type: string }
        size: { type: integer, format: int64 }
        content_type: { type: string }
        sha256: { type: string }

    SkillDownload:
      type: object
      description: >
        One skill's files inline: utf8 text as-is, binary base64-encoded.
        truncated=true (bulk downloads only) means the files were omitted for
        the response budget — fetch via GET /v1/skills/{id}/download.
      properties:
        slug: { type: string }
        skill_id: { type: string, format: uuid }
        version: { type: integer, description: The downloaded content's version number (record it to detect later updates). }
        truncated: { type: boolean }
        files:
          type: array
          items:
            type: object
            properties:
              path: { type: string }
              content: { type: string }
              encoding: { type: string, enum: [utf8, base64] }

    Error:
      type: object
      properties:
        error: { type: string, description: Stable machine-readable code }
        message: { type: string }

    BillingPlan:
      type: object
      description: "[CLOUD-ONLY] The org's current plan (GET /v1/billing). plan_tier is read from app.org_meta (authoritative)."
      properties:
        plan_tier: { type: string, enum: [free, pro, business, enterprise] }
        status: { type: string, enum: [active, trialing, past_due, canceled, incomplete], description: Stripe subscription status (omitted if no subscription row). }
        org_status: { type: string, enum: [active, over_limit, past_due, suspended], description: Derived account state mirrored to the edge. }
        seats: { type: integer, format: int64 }

    QuotaExceeded:
      type: object
      description: 402 body (see internal/quota.ExceededError); the dashboard opens the upgrade/sales modal.
      properties:
        limit: { type: string, enum: [sites_per_user, members_per_org, custom_domains_per_org] }
        current: { type: integer, format: int64 }
        max: { type: integer, format: int64 }
        plan_tier: { type: string }
        next_tier: { type: string }
        upgrade_url: { type: string, format: uri }
        sales_url: { type: string, format: uri }

  responses:
    Unauthorized:
      description: Missing/invalid token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but not permitted (e.g. not admin/owner, expired link, not on allowlist, external sharing disabled)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unavailable:
      description: A required dependency (DB, edge signer, custom-domain provider) is not configured
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    BadRequest:
      description: Malformed request / reserved slug / verification failure
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource absent (or invisible under the caller's tenant)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Slug/host already in use by another org/site (global host registry)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    QuotaExceeded:
      description: A hard cap was crossed (cloud build only)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/QuotaExceeded" }
    Error405:
      description: Method not allowed (e.g. a non-POST to the Stripe webhook)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Error500:
      description: Internal error (the request may be retried; persistence is idempotent)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
