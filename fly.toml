# Dropway Go API — Fly.io deploy manifest (app: dropway-production).
#
# Committed so Fly can deploy from CI (GitHub Actions → flyctl). It holds only
# non-secret deploy config — NO credentials. All secrets are set out-of-band with
# `fly secrets set` (DATABASE_URL, S3_*, CF_*, EDGE_SIGNING_KEY, JWT_*, ...) and
# never live in this file.
#
# Build context is the REPO ROOT (the Go module spans the whole repo), so run
# `fly deploy` FROM THE REPO ROOT (this file is read by default).

app = "dropway-production"
primary_region = "iad"   # set to the region nearest your Supabase DB (iad = US East)

[build]
  dockerfile = "services/api/Dockerfile"
  # Hosted/cloud build (Stripe billing + cloud quota bands). Leave commented for OSS.
  [build.args]
    DROPWAY_BUILD_TAGS = "cloud"

[env]
  # Error tracking (internal/errtrack). Non-secret config only; the project key is
  # set out-of-band with `fly secrets set POSTHOG_KEY=phc_...`. With the key set,
  # caught + uncaught errors and panics report to PostHog Error Tracking; without
  # it the sink is a no-op.
  ENVIRONMENT = "production"
  POSTHOG_HOST = "https://us.i.posthog.com"
  # Postgres pool ceiling (internal/pgpool; default 8 in the API). Raise together
  # with the pooler's capacity if error tracking shows "postgres pool exhausted:
  # acquisitions timed out". DATABASE_URL should point at the TRANSACTION-mode
  # pooler (Supabase port 6543) so these connections multiplex onto few backends.
  # DB_MAX_CONNS = "8"

[http_service]
  internal_port = 8080
  force_https = true
  # Always-on control plane: keep one machine up (no cold starts on the auth path).
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  method = "GET"
  path = "/healthz"
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
