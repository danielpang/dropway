# fly.toml app configuration file generated for dropway-api on 2026-06-21T20:09:03Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "dropway-api"
primary_region = "iad"   # set to the region nearest your Supabase DB (iad = US East)

[build]
  dockerfile = "services/api/Dockerfile"
  # Hosted/cloud build (Stripe billing + cloud quota bands). Leave commented for OSS.

  [build.args]
    DROPWAY_BUILD_TAGS = "cloud"

[http_service]
  internal_port = 8080
  force_https = true
  # Always-on control plane: keep one machine up (no cold starts on the auth path).
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  checks = [{ grace_period = '10s', interval = '15s', method = 'GET', path = '/healthz', timeout = '2s' }]
  concurrency = { hard_limit = 250, soft_limit = 200, type = 'requests' }

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  method = "GET"
  path = "/healthz"
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
